<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PAGE_TITLE__</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap");

  :root {
    --bg: #091018;
    --bg-card: #111a24;
    --bg-code: #0a121b;
    --text: #d9e2ec;
    --text-muted: #8ca0b3;
    --text-bright: #f8fbff;
    --accent-primary: #61dafb;
    --accent-secondary: #f59e0b;
    --accent-highlight: #34d399;
    --border: #1f2b38;
    --shadow: rgba(0, 0, 0, 0.35);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background:
      radial-gradient(circle at top, rgba(97, 218, 251, 0.12), transparent 36%),
      linear-gradient(180deg, #071019 0%, #091018 22%, #091018 100%);
    color: var(--text);
    font-family: "Inter", sans-serif;
    line-height: 1.7;
    overflow-x: hidden;
  }

  a {
    color: inherit;
  }

  code,
  pre {
    font-family: "JetBrains Mono", monospace;
  }

  .story-nav {
    position: fixed;
    top: 50%;
    right: 1.25rem;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .nav-dot {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.06);
    cursor: pointer;
    position: relative;
    transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
  }

  .nav-dot:hover,
  .nav-dot.active {
    transform: scale(1.08);
    background: var(--accent-secondary);
    border-color: var(--accent-secondary);
  }

  .nav-tooltip {
    position: absolute;
    top: 50%;
    right: calc(100% + 0.75rem);
    transform: translateY(-50%);
    padding: 0.35rem 0.55rem;
    border-radius: 999px;
    background: rgba(10, 18, 27, 0.95);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 180ms ease;
  }

  .nav-dot:hover .nav-tooltip {
    opacity: 1;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 4rem 1.5rem 6rem;
    position: relative;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: auto auto 10% 50%;
    transform: translateX(-50%);
    width: 38rem;
    height: 38rem;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.11), transparent 68%);
    pointer-events: none;
  }

  .hero-label {
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent-secondary);
    margin-bottom: 1.25rem;
  }

  .hero h1 {
    font-size: clamp(2.6rem, 6vw, 4.8rem);
    line-height: 1.08;
    max-width: 15ch;
    color: var(--text-bright);
  }

  .hero-sub {
    max-width: 42rem;
    margin-top: 1.4rem;
    font-size: 1.1rem;
    color: var(--text-muted);
  }

  .scroll-hint {
    margin-top: 2rem;
    color: var(--text-muted);
    font-size: 0.84rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .act {
    max-width: 54rem;
    margin: 0 auto;
    padding: 5rem 1.5rem;
  }

  .act-label {
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent-secondary);
    margin-bottom: 0.55rem;
  }

  .act h2 {
    font-size: clamp(1.9rem, 4vw, 3rem);
    line-height: 1.15;
    color: var(--text-bright);
    margin-bottom: 1.35rem;
  }

  .act h3 {
    margin: 2.6rem 0 0.8rem;
    font-size: 1.25rem;
    color: var(--text-bright);
  }

  .act p {
    margin-bottom: 1rem;
    font-size: 1.03rem;
  }

  .divider {
    max-width: 54rem;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  .divider hr {
    border: 0;
    border-top: 1px solid var(--border);
  }

  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 520ms ease, transform 520ms ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .insight,
  .metaphor,
  .vs-card,
  .option-card,
  .code-block,
  .diagram {
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 14px 32px -24px var(--shadow);
  }

  .insight {
    margin: 1.8rem 0;
    padding: 1.15rem 1.25rem;
    background: linear-gradient(135deg, rgba(97, 218, 251, 0.1), rgba(52, 211, 153, 0.06));
  }

  .insight-label {
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent-highlight);
    margin-bottom: 0.45rem;
  }

  .metaphor {
    display: grid;
    grid-template-columns: 3.4rem 1fr;
    gap: 1rem;
    margin: 1.8rem 0;
    padding: 1.25rem;
    background: rgba(255, 255, 255, 0.03);
  }

  .metaphor-mark {
    width: 3.4rem;
    height: 3.4rem;
    display: grid;
    place-items: center;
    border-radius: 12px;
    background: rgba(245, 158, 11, 0.12);
    color: var(--accent-secondary);
    font-size: 1.35rem;
    font-weight: 800;
  }

  .metaphor-body h4 {
    color: var(--text-bright);
    margin-bottom: 0.3rem;
    font-size: 1rem;
  }

  .metaphor-body p {
    margin-bottom: 0;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .flow {
    display: grid;
    gap: 0.9rem;
    margin: 1.8rem 0;
  }

  .flow-step {
    display: grid;
    grid-template-columns: 2.5rem 1fr;
    gap: 0.95rem;
    align-items: start;
  }

  .flow-num {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: var(--accent-secondary);
    color: #091018;
    font-weight: 800;
    font-size: 0.88rem;
  }

  .flow-content h4 {
    color: var(--text-bright);
    margin-bottom: 0.15rem;
  }

  .flow-content p {
    color: var(--text-muted);
    margin-bottom: 0;
    font-size: 0.95rem;
  }

  .vs-grid,
  .options-grid {
    display: grid;
    gap: 1rem;
    margin: 1.8rem 0;
  }

  .vs-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .options-grid {
    grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
  }

  .vs-card,
  .option-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 1.2rem;
    position: relative;
    overflow: hidden;
  }

  .vs-card::before,
  .option-card::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
  }

  .vs-card h4,
  .option-card h4 {
    color: var(--text-bright);
    margin-bottom: 0.55rem;
  }

  .vs-card p,
  .option-card p,
  .vs-card li {
    color: var(--text-muted);
    font-size: 0.94rem;
  }

  .vs-card ul {
    list-style: none;
    display: grid;
    gap: 0.4rem;
    padding-left: 0;
  }

  .vs-card li {
    padding-left: 0.95rem;
    position: relative;
  }

  .vs-card li::before {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: var(--accent-primary);
    left: 0;
    top: 0.65rem;
  }

  .option-card code {
    display: inline-block;
    margin-bottom: 0.45rem;
    color: var(--accent-highlight);
    background: rgba(52, 211, 153, 0.08);
    padding: 0.18rem 0.45rem;
    border-radius: 999px;
    font-size: 0.76rem;
  }

  .code-block {
    background: var(--bg-code);
    margin: 1.8rem 0;
    overflow: hidden;
  }

  .code-header {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .code-block pre {
    padding: 1rem;
    overflow-x: auto;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text-bright);
  }

  .diagram {
    background: var(--bg-code);
    margin: 1.8rem 0;
    padding: 1rem;
    white-space: pre-wrap;
    font-size: 0.82rem;
    line-height: 1.65;
    color: var(--text-muted);
  }

  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.8rem 0;
    font-size: 0.9rem;
  }

  .comparison-table th,
  .comparison-table td {
    padding: 0.8rem 0.9rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .comparison-table th {
    color: var(--text-bright);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .comparison-table td {
    color: var(--text-muted);
  }

  .highlight-primary {
    color: var(--accent-primary);
    font-weight: 700;
  }

  .highlight-secondary {
    color: var(--accent-secondary);
    font-weight: 700;
  }

  .highlight-strong {
    color: var(--accent-highlight);
    font-weight: 700;
  }

  .footer {
    max-width: 54rem;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .files {
    margin-top: 0.8rem;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.03);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.78rem;
    line-height: 1.7;
  }

  @media (max-width: 960px) {
    .story-nav {
      display: none;
    }
  }

  @media (max-width: 640px) {
    .hero {
      min-height: auto;
      padding-top: 6rem;
    }

    .vs-grid {
      grid-template-columns: 1fr;
    }

    .metaphor {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<nav class="story-nav">
__NAV_ITEMS__
</nav>

<section class="hero" id="hero">
  <div class="hero-label">__HERO_LABEL__</div>
  <h1>__HERO_TITLE__</h1>
  <p class="hero-sub">__HERO_SUBTITLE__</p>
  <div class="scroll-hint">Scroll to explore</div>
</section>

<div class="divider"><hr></div>

__SECTION_ITEMS__

<footer class="footer">
  <p>__FOOTER_LABEL__</p>
  <div class="files">
__FOOTER_SOURCES__
  </div>
</footer>

<script>
const revealNodes = document.querySelectorAll(".reveal");
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.12 });
revealNodes.forEach((node) => revealObserver.observe(node));

const navDots = document.querySelectorAll(".nav-dot");
navDots.forEach((dot) => {
  dot.addEventListener("click", () => {
    const targetId = dot.getAttribute("data-target");
    const targetNode = document.getElementById(targetId);
    if (targetNode) {
      targetNode.scrollIntoView({ behavior: "smooth" });
    }
  });
});

const sectionNodes = Array.from(navDots)
  .map((dot) => document.getElementById(dot.getAttribute("data-target")))
  .filter(Boolean);

const activeObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (!entry.isIntersecting) {
      return;
    }
    navDots.forEach((dot) => dot.classList.remove("active"));
    const activeDot = document.querySelector(`.nav-dot[data-target="${entry.target.id}"]`);
    if (activeDot) {
      activeDot.classList.add("active");
    }
  });
}, { threshold: 0.35 });

sectionNodes.forEach((node) => activeObserver.observe(node));
</script>
</body>
</html>
